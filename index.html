!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membuka di Chrome...</title>
</head>
<body style="text-align: center; font-family: sans-serif; padding-top: 50px;">

    <h3>Membuka di Google Chrome...</h3>
    <p>Jika halaman tidak berpindah otomatis, silakan klik tombol di bawah ini:</p>
    
    <!-- Tombol Manual khusus Android -->
    <button onclick="bukaChrome()" style="padding: 12px 24px; font-weight: bold; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
        Buka di Browser Utama
    </button>

    <script>
        var linkTujuan = "github.com/mancantak123/my-coding";

        function bukaChrome() {
            // Memaksa Android membuka Google Chrome menggunakan skema intent murni
            window.location.href = "intent://" + linkTujuan + "#Intent;scheme=https;package=com.android.chrome;end";
        }

        // Jalankan otomatis saat halaman pertama kali dimuat
        window.onload = function() {
            bukaChrome();
        };
    </script>

</body>
</html>
