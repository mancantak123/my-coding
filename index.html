<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Trik khusus untuk memaksa keluar dari In-App Browser Instagram
        function forceOut() {
            var targetUrl = "https://github.com/mancantak123/my-coding";
            
            // Jika dibuka di Android (Instagram Browser sering menyerah kalau dipicu download intent)
            if (/Android/i.test(navigator.userAgent)) {
                window.location.href = "intent://" + targetUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            } else {
                // Untuk iOS/Umum, langsung alihkan biasa
                window.location.href = targetUrl;
            }
        }
        window.onload = forceOut;
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <p>Membuka repositori di browser utama...</p>
        <p>Jika tidak berpindah, <a href="https://github.com/mancantak123/my-coding" target="_blank" style="color: #007bff; font-weight: bold;">Klik di Sini</a></p>
    </div>
</body>
</html>
