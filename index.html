<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="refresh" content="0; url=https://github.com/mancantak123/my-coding">
    
    <title>Membuka Repositori...</title>
    
    <script>
        function redirect() {
            var targetUrl = "https://github.com/mancantak123/my-coding";
            
            // 1. JIKA ANDROID: Paksa tendang keluar ke aplikasi Google Chrome eksternal
            if (/Android/i.test(navigator.userAgent)) {
                window.location.href = "intent://" + targetUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            } 
            // 2. JIKA SELAIN ANDROID (iOS/PC): Alihkan langsung menggunakan JS biasa
            else {
                window.location.href = targetUrl;
            }
        }
        window.onload = redirect;
    </script>
</head>
<body style="text-align: center; font-family: sans-serif; padding-top: 50px; background-color: #fafafa;">
    <p style="color: #666; font-size: 16px;">Mengarahkan ke GitHub, mohon tunggu sebentar...</p>
</body>
</html>
